<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sabi+ | Resposta Registrada</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red: #c0392b;
      --red-light: #e74c3c;
      --green: #27ae60;
      --yellow: #f39c12;
      --dark: #1a1a1a;
      --mid: #4a4a4a;
      --light: #f7f4f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background-color: var(--light);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Fundo decorativo */
    body::before {
      content: '';
      position: fixed;
      top: -120px; right: -120px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(192,57,43,0.08), transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; left: -100px;
      width: 350px; height: 350px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(192,57,43,0.06), transparent 70%);
      pointer-events: none;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.10);
      max-width: 480px;
      width: 100%;
      padding: 48px 40px;
      text-align: center;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 130px;
      margin-bottom: 32px;
    }

    .icon-wrap {
      width: 72px; height: 72px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px;
      margin: 0 auto 24px;
      animation: popIn 0.5s 0.3s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.4); }
      to   { opacity: 1; transform: scale(1); }
    }

    .icon-sim  { background: #eafaf1; }
    .icon-nao  { background: #fdf3f2; }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      color: var(--dark);
      margin-bottom: 14px;
      line-height: 1.3;
    }

    p.sub {
      font-size: 15px;
      color: var(--mid);
      line-height: 1.75;
      margin-bottom: 28px;
    }

    .badge {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 20px;
      margin-bottom: 32px;
    }
    .badge-sim { background: #eafaf1; color: var(--green); }
    .badge-nao { background: #fdf3f2; color: var(--red); }

    .divider {
      border: none;
      border-top: 1px solid #eeeeee;
      margin: 0 0 28px;
    }

    .footer-msg {
      font-size: 13px;
      color: #aaa;
      line-height: 1.6;
    }

    .footer-msg a {
      color: var(--red);
      text-decoration: none;
      font-weight: 700;
    }

    .loading {
      font-size: 14px;
      color: #bbb;
      margin-top: 20px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }
    .loading.done { display: none; }

    /* Estado de erro */
    .error-msg {
      display: none;
      font-size: 13px;
      color: #e74c3c;
      margin-top: 16px;
    }
  </style>
</head>
<body>

<div class="card" id="card">

  <img
    src="https://sabi.org.br/wp-content/uploads/2022/01/logo-sabi-centro-cutural-14.png"
    alt="Logo Sabi+"
    class="logo"
  />

  <div id="icon" class="icon-wrap"></div>
  <div id="badge" class="badge"></div>
  <h1 id="titulo"></h1>
  <p class="sub" id="mensagem"></p>

  <hr class="divider"/>

  <p class="footer-msg">
    Dúvidas? Fale com a gente pelo Instagram
    <a href="https://www.instagram.com/sabi_mais" target="_blank">@sabi_mais</a>
    ou pelo
    <a href="https://api.whatsapp.com/send?phone=5551981583464" target="_blank">WhatsApp</a>.
  </p>

  <p class="loading" id="loading">Registrando sua resposta...</p>
  <p class="error-msg" id="erroMsg">Não foi possível registrar sua resposta. Tente novamente ou entre em contato conosco.</p>

</div>

<script>
  const WEBHOOK_URL = "https://hook.us2.make.com/pavokvpn4g15rvlemuk2imxk48iupner";

  const params   = new URLSearchParams(window.location.search);
  const resposta = params.get("resposta") || "nao";
  const linha    = params.get("linha")    || "";
  const email    = params.get("email")    || "";

  const isSim = resposta === "sim";

  const icon     = document.getElementById("icon");
  const badge    = document.getElementById("badge");
  const titulo   = document.getElementById("titulo");
  const mensagem = document.getElementById("mensagem");

  if (isSim) {
    icon.innerHTML    = "✅";
    icon.classList.add("icon-sim");
    badge.textContent = "Interesse confirmado";
    badge.classList.add("badge-sim");
    titulo.textContent   = "Ótimo! Recebemos seu interesse.";
    mensagem.textContent = "Em breve um dos nossos atendentes vai entrar em contato com você para dar continuidade. Fique de olho no seu e-mail e WhatsApp!";
  } else {
    icon.innerHTML    = "👋";
    icon.classList.add("icon-nao");
    badge.textContent = "Resposta registrada";
    badge.classList.add("badge-nao");
    titulo.textContent   = "Tudo bem, sem problemas!";
    mensagem.textContent = "Agradecemos por responder. Se mudar de ideia no futuro, é só entrar em contato com a gente. Será um prazer te receber!";
  }

  const loading = document.getElementById("loading");
  const erroMsg = document.getElementById("erroMsg");

  fetch(`${WEBHOOK_URL}?resposta=${encodeURIComponent(resposta)}&linha=${encodeURIComponent(linha)}&email=${encodeURIComponent(email)}`)
    .then(res => {
      loading.classList.add("done");
    })
    .catch(() => {
      loading.classList.add("done");
      erroMsg.style.display = "block";
    });
</script>

</body>
</html>
